<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ミラため性格診断 全16タイプ図鑑｜ミラため</title>
    <meta
      name="description"
      content="ミラため性格診断（お金の性格診断）の全16タイプを一挙紹介。ためる×そだてるのリス、コツコツのハムスター、まわして増やすミツバチ、ゆったりカピバラ——あなたはどのタイプ？"
    />
    <meta property="og:title" content="ミラため性格診断 全16タイプ図鑑" />
    <meta property="og:description" content="あなたのお金の性格は16タイプのどれ？無料・30秒・登録不要の診断。" />
    <meta property="og:type" content="article" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:image" content="https://kyuusaku16-a11y.github.io/miratame/og-card.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="og:url" content="https://kyuusaku16-a11y.github.io/miratame/types.html" />
    <link rel="canonical" href="https://kyuusaku16-a11y.github.io/miratame/types.html" />
    <link rel="icon" href="assets/sprout.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="guide">
    <header>
      <div class="brand">
        <img class="char-img" src="assets/pair-sit.png" alt="" aria-hidden="true" />
        <div class="brand-text">
          <h1>ミラため性格診断</h1>
          <p class="tagline">全16タイプ図鑑</p>
        </div>
      </div>
    </header>

    <main class="guide-main">
      <article class="panel guide-body">
        <p><a class="guide-back" href="./">← シミュレーターにもどる</a></p>
        <p>
          あなたの入力から<strong>「ため力」「そだて方」「そなえ」「しこみ」</strong>の4つの軸を読み取って、
          16タイプの動物に当てはめます。質問はゼロ、答えは実際の家計だから正直。
          どのタイプにも、いいところしかありません。数字を変えるとタイプも進化します。
        </p>
        <div class="type-grid" id="typeGrid"></div>
        <p class="guide-cta"><a href="./?diagnose=1">🌰 自分のタイプを診断する（無料・30秒）</a></p>
      </article>
    </main>

    <footer>
      <p>診断はミラための入力内容から4つの軸を読み取るお楽しみ機能です。結果に金額は含まれません。</p>
      <p><a href="./">トップにもどる</a>／<a href="guide.html">使い方と計算の仕組み</a></p>
    </footer>

    <script type="module">
      import { allTypes } from './src/share.js';
      const grid = document.getElementById('typeGrid');
      for (const t of allTypes()) {
        const card = document.createElement('div');
        card.className = 'type-card';
        const emoji = document.createElement('span');
        emoji.className = 'type-emoji';
        emoji.textContent = t.emoji;
        const code = document.createElement('span');
        code.className = 'type-code';
        code.textContent = t.code.split('').join('-');
        const name = document.createElement('strong');
        name.textContent = t.name;
        const tags = document.createElement('p');
        tags.className = 'type-tags';
        tags.textContent = t.tags.join('×');
        const quote = document.createElement('p');
        quote.className = 'type-quote';
        quote.textContent = `「${t.hitokoto}」`;
        card.append(emoji, code, name, tags, quote);
        grid.appendChild(card);
      }
    </script>
    <script data-goatcounter="https://money-vision.goatcounter.com/count" async src="vendor/count.js"></script>
  </body>
</html>
