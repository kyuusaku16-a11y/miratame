<!DOCTYPE html>
<!-- ホーム画面アイコン（apple-touch-icon.png 180×180）の生成テンプレート。#icon をスクリーンショットする -->
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      body { margin: 0; }
      #icon {
        width: 180px;
        height: 180px;
        background: linear-gradient(150deg, #fdf3ee 0%, #f9dfe3 100%);
        display: grid;
        place-content: center;
      }
      #icon img { width: 156px; height: 156px; }
    </style>
  </head>
  <body>
    <div id="icon"><img src="../assets/piyo-face.png" alt="" /></div>
  </body>
</html>
