<!DOCTYPE html>
<!-- OGP画像（og-card.jpg 1200×630）の生成テンプレート。
     使い方: ルートでサーバーを立て /scripts/og-card.html を開き、#card を1200×630でスクリーンショット→JPG変換 -->
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet" />
    <style>
      body { margin: 0; font-family: 'Zen Maru Gothic', sans-serif; }
      #card {
        width: 1200px;
        height: 630px;
        box-sizing: border-box;
        padding: 28px;
        background: linear-gradient(135deg, #fbe3e6 0%, #f7d7dc 55%, #f3cdd4 100%);
        display: flex;
      }
      .panel {
        flex: 1;
        background: #fffdf8;
        border-radius: 28px;
        display: flex;
        align-items: center;
        gap: 30px;
        padding: 40px 52px;
        box-sizing: border-box;
      }
      .left { flex: 1.05; display: flex; flex-direction: column; justify-content: center; }
      .kicker { display: flex; align-items: center; gap: 10px; font-size: 26px; font-weight: 700; color: #b0616d; }
      .kicker img { width: 34px; height: 34px; }
      h1 { margin: 14px 0 0; font-size: 64px; line-height: 1.32; font-weight: 900; color: #5b463f; letter-spacing: 0.01em; }
      h1 .pink { color: #c96b78; }
      .chips { display: flex; gap: 14px; margin-top: 34px; }
      .chips span {
        border: 3px solid #e8a0aa;
        color: #b0616d;
        border-radius: 999px;
        padding: 10px 24px;
        font-size: 24px;
        font-weight: 700;
        background: #fff;
      }
      .brand { display: flex; align-items: center; gap: 14px; margin-top: 44px; }
      .brand img { width: 62px; height: 62px; border-radius: 50%; background: #f7dfe2; }
      .brand strong { display: block; font-size: 30px; color: #b0616d; }
      .brand small { font-size: 18px; color: #a08d82; }
      .grid { display: grid; grid-template-columns: repeat(4, 108px); grid-auto-rows: 108px; gap: 14px; }
      .grid div {
        background: #fff;
        border: 2px solid #f3dee1;
        border-radius: 20px;
        display: grid;
        place-content: center;
      }
      .grid img { width: 92px; height: 92px; object-fit: contain; }
    </style>
  </head>
  <body>
    <div id="card">
      <div class="panel">
        <div class="left">
          <div class="kicker"><img src="../assets/sprout.png" alt="" />ミラため性格診断</div>
          <h1>あなたの<br /><span class="pink">"お金の性格"</span>は<br />どのタイプ？</h1>
          <div class="chips"><span>全16タイプ</span><span>無料・30秒</span><span>登録不要</span></div>
          <div class="brand">
            <img src="../assets/piyo-face.png" alt="" />
            <span><strong>ミラため</strong><small>未来のために、貯めて育てる</small></span>
          </div>
        </div>
        <div class="grid" id="grid"></div>
      </div>
    </div>
    <script>
      const codes = ['CGSF','CGSN','CGLF','CGLN','CMSF','CMSN','CMLF','CMLN','YGSF','YGSN','YGLF','YGLN','YMSF','YMSN','YMLF','YMLN'];
      document.getElementById('grid').innerHTML = codes
        .map((c) => `<div><img src="../assets/types/${c}.png" alt="" /></div>`)
        .join('');
    </script>
  </body>
</html>
